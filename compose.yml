services:
  app:
    build: .
    depends_on:
      db_migrate:
        condition: service_completed_successfully
    env_file: .env.production
    ports:
      - 3000:3000
  db:
    image: postgres:18.4-alpine3.23
    env_file: .postgres.env
    volumes:
      - postgres-data:/var/lib/postgresql
  db_migrate:
    build: .
    restart: no
    depends_on:
      - db
    env_file:
      - .env.production
    command: ["./bin/rails", "db:create"]
volumes:
  postgres-data:
